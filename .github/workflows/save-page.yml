name: Auto Save Webpage to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 切換到 gh-pages 分支，如果不存在則會基於 main 建立
          ref: 'gh-pages'
          # 如果這是第一次跑，還沒有 gh-pages 分支，請先手動建立或將此行註解掉
        continue-on-error: true # 第一次執行若無此分支則跳過

      - name: Ensure Directory Structure
        run: mkdir -p archives

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          
      - name: Generate Index Page
        run: |
          MONTH=$(date +%Y%m)
          echo "Processing month: $MONTH"
          echo "Files in archives/$MONTH/:"
          ls -la archives/$MONTH/ 2>/dev/null || echo "Directory empty or not found"
          
          echo "<html><body style='font-family:sans-serif;padding:20px;'><h1>Archives Index</h1><ul>" > index.html
          ls archives/$MONTH/*.html 2>/dev/null | sort -r | xargs -I {} echo "<li><a href='./{}'>{}</a></li>" >> index.html
          echo "</ul></body></html>" >> index.html
          
          echo "Generated index.html:"
          cat index.html

      - name: Commit and Push to gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto save to gh-pages: $(date +'%Y-%m-%d %H:%M')" || exit 0
          # 強制推送到 gh-pages 分支
          git push origin HEAD:gh-pages