name: Auto Save Webpage to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'gh-pages'
        continue-on-error: true

      - name: Copy archives from main
        run: |
          git fetch origin main
          mkdir -p archives
          git checkout origin/main -- archives/

      - name: Ensure Directory Structure
        run: mkdir -p archives

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          
      - name: Generate Index Page
        run: |
          MONTH=$(date +%Y%m)
          echo "Processing month: $MONTH"
          echo "Files in archives/$MONTH/:"
          ls -la archives/$MONTH/ 2>/dev/null || echo "Directory empty or not found"
          
          echo "<html><body style='font-family:sans-serif;padding:20px;'><h1>Archives Index</h1><ul>" > index.html
          ls archives/$MONTH/*.html 2>/dev/null | sort -r | xargs -I {} echo "<li><a href='./{}'>{}</a></li>" >> index.html
          echo "</ul></body></html>" >> index.html
          
          echo "Generated index.html:"
          cat index.html

      - name: Commit and Push to gh-pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto save to gh-pages: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push origin HEAD:gh-pages